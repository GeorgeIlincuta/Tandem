<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tandem</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Titlebar -->
      <div class="titlebar">
        <div class="drag" data-tauri-drag-region></div>
        <button class="win-ctl" id="win-min" title="Minimieren" aria-label="Minimize">
          <svg width="11" height="11" stroke="currentColor" stroke-width="1.2"><line x1="1" y1="6" x2="10" y2="6" /></svg>
        </button>
        <button class="win-ctl" id="win-max" title="Maximieren" aria-label="Maximize">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.1"><rect x="1.5" y="1.5" width="8" height="8" rx="1" /></svg>
        </button>
        <button class="win-ctl close" id="win-close" title="Schließen" aria-label="Close">
          <svg width="11" height="11" stroke="currentColor" stroke-width="1.2"><line x1="2" y1="2" x2="9" y2="9" /><line x1="9" y1="2" x2="2" y2="9" /></svg>
        </button>
      </div>

      <!-- Header -->
      <div class="header">
        <div class="left">
          <span class="wordmark">Tandem</span>
          <span class="divider"></span>
          <span class="status-chip">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-label" id="status-label">…</span>
          </span>
        </div>
        <div class="right">
          <button class="btn-ghost" id="new-btn">
            <svg width="12" height="12" stroke="currentColor" stroke-width="1.4"><line x1="6" y1="1.5" x2="6" y2="10.5" /><line x1="1.5" y1="6" x2="10.5" y2="6" /></svg>
            New
          </button>
          <button class="btn-icon" id="settings-btn" title="Einstellungen" aria-label="Settings">
            <svg width="15" height="15" fill="none" stroke="#c4c8cd" stroke-width="1.3">
              <line x1="1" y1="4.5" x2="14" y2="4.5" /><circle cx="10" cy="4.5" r="2" fill="#1e1e24" />
              <line x1="1" y1="10.5" x2="14" y2="10.5" /><circle cx="5" cy="10.5" r="2" fill="#1e1e24" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Transcript -->
      <div class="transcript" id="transcript"></div>

      <!-- Record bar -->
      <div class="recordbar" id="recordbar" data-state="ready">
        <div class="rec-line">
          <span class="ready-text">press to speak</span>
          <span class="waveform">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
          </span>
          <span class="thinking">
            <span class="word">thinking</span>
            <span class="dots"><span></span><span></span><span></span></span>
          </span>
        </div>
        <button class="rec-btn" id="rec-btn" aria-label="Record">
          <svg class="mic-icon" width="22" height="22" viewBox="0 0 20 20" fill="none">
            <rect x="7" y="2" width="6" height="10" rx="3" fill="#cdb487" />
            <path d="M4.2 9.4a5.8 5.8 0 0 0 11.6 0" stroke="#cdb487" stroke-width="1.5" />
            <line x1="10" y1="15.2" x2="10" y2="18" stroke="#cdb487" stroke-width="1.5" />
            <line x1="6.6" y1="18" x2="13.4" y2="18" stroke="#cdb487" stroke-width="1.5" />
          </svg>
          <span class="stop-icon"></span>
        </button>
        <div class="rec-caption" id="rec-caption">Record</div>
      </div>
    </div>

    <!-- Settings overlay -->
    <div class="overlay" id="overlay">
      <div class="panel">
        <h2>Settings</h2>
        <div class="hint">Conversation &amp; connection</div>

        <label for="serverUrl">Server URL</label>
        <div class="row">
          <input id="serverUrl" type="text" spellcheck="false" />
          <button class="btn-test" id="test-btn">Test connection</button>
        </div>
        <span class="test-status" id="test-status"></span>

        <label for="voice">Tutor voice</label>
        <select id="voice"></select>

        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt" spellcheck="false"></textarea>

        <div class="actions">
          <button class="btn-secondary" id="close-btn">Close</button>
          <button class="btn-primary" id="save-btn">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
